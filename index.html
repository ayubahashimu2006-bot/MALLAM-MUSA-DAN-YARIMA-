<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MALLAM MUSA DAN YARIMA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
color:white;
transition:1s ease-in-out;
background-size:cover;
background-position:center;
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding-bottom:60px;
}

/* HEADER */
header{
text-align:center;
padding:20px;
}

h1{
color:#f5c542;
font-size:28px;
letter-spacing:2px;
}

h3{
margin-top:5px;
color:#fff;
}

/* ISLAMIC STICKERS */
.badges{
display:flex;
justify-content:center;
gap:15px;
margin-top:10px;
flex-wrap:wrap;
}

.badge{
background:rgba(255,255,255,0.1);
padding:8px 12px;
border-radius:20px;
font-size:12px;
border:1px solid rgba(255,255,255,0.2);
}

/* LANGUAGE */
.lang button{
margin:4px;
padding:6px 10px;
border:none;
cursor:pointer;
background:#1f2937;
color:white;
border-radius:5px;
transition:0.3s;
}
.lang button:hover{
background:#f5c542;
color:black;
}

/* CARD */
.card{
max-width:900px;
margin:20px auto;
background:rgba(17,24,39,0.75);
padding:25px;
border-radius:15px;
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
}

/* ANIMATED TEXT */
.fade{
animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

h2{
color:#f5c542;
margin-bottom:10px;
}

p{
line-height:1.7;
margin-bottom:10px;
}

/* SERVICES */
ol{
text-align:left;
padding-left:20px;
line-height:1.8;
}

/* WHATSAPP BUTTON */
.whatsapp-btn{
display:block;
margin:25px auto;
padding:18px;
background:#25D366;
color:white;
font-size:20px;
font-weight:bold;
text-decoration:none;
border-radius:12px;
width:90%;
max-width:400px;
text-align:center;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
animation:bounce 1.5s infinite;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.float img{
width:35px;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* POPUP */
.popup{
position:fixed;
bottom:90px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50px;
display:none;
align-items:center;
gap:10px;
cursor:pointer;
animation:bounce 1.5s infinite;
}
</style>
</head>

<body>

<div class="overlay">

<header class="fade">
<h1>MALLAM MUSA DAN YARIMA</h1>
<h3 id="greet">ASSALAMUALAIKUM</h3>

<div class="badges">
<div class="badge">🕋 KAABA INSPIRED</div>
<div class="badge">📖 QUR’AN GUIDANCE</div>
<div class="badge">🌙 ISLAMIC SUPPORT</div>
</div>

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('ha')">Hausa</button>
<button onclick="setLang('fr')">French</button>
<button onclick="setLang('ar')">Arabic</button>
</div>
</header>

<div class="card fade">

<h2 id="title">Bismillahir Rahmanir Rahim</h2>

<p id="intro1"></p>
<p id="intro2"></p>

<h4 id="serviceTitle">Ayyukan da muke bayarwa sun hada da:</h4>

<ol id="services"></ol>

<p id="closing"></p>
<p id="contact"></p>

<a class="whatsapp-btn" href="https://wa.me/2348131920605" target="_blank">
📲 CHAT ON WHATSAPP NOW
</a>

</div>

</div>

<!-- FLOAT -->
<a class="float" href="https://wa.me/2348131920605" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<strong>WhatsApp</strong>
</a>

<!-- POPUP -->
<div class="popup" id="popup" onclick="window.open('https://wa.me/2348131920605')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="35">
<strong>Message Us</strong>
</div>

<script>

/* FULL LANGUAGE SYSTEM */
const texts = {
en:{
greet:"ASSALAMUALAIKUM",
title:"Bismillahir Rahmanir Rahim",
intro1:"We greet all seekers of help and guidance with kindness and peace.",
intro2:"We provide Qur’anic teachings and life guidance with wisdom and halal methods.",
services:[
"Seeking wealth and financial ease",
"Marriage and family guidance",
"Success in life and work",
"Istikhara guidance",
"Solving life problems",
"Strengthening faith and Qur’an understanding",
"Helping students in studies",
"Peace of heart and home"
],
closing:"We aim to bring peace, light, and clarity through guidance and prayer.",
contact:"For more information, contact us directly."
},
ha:{
greet:"ASSALAMUALAIKUM",
title:"Bismillahir Rahmanir Rahim",
intro1:"Muna gaishe ku da fatan alheri da shiriya.",
intro2:"Muna bayar da karatun Al-Qur’ani da shawarwari cikin halal.",
services:[
"Neman arziki da sauƙin rayuwa",
"Aure da zaman iyali",
"Nasara a rayuwa da aiki",
"Istikhara",
"Matsalolin rayuwa",
"Karfafa imani",
"Taimakon dalibai",
"Zaman lafiya"
],
closing:"Muna kawo haske da kwanciyar hankali ga rayuwa.",
contact:"Domin karin bayani ku tuntube mu."
},
fr:{
greet:"ASSALAMUALAIKUM",
title:"Bismillahir Rahmanir Rahim",
intro1:"Nous saluons tous les chercheurs de guidance.",
intro2:"Nous offrons des conseils basés sur le Coran.",
services:[
"Richesse",
"Mariage",
"Succès",
"Istikhara",
"Problèmes",
"Foi",
"Étudiants",
"Paix"
],
closing:"Nous apportons paix et lumière.",
contact:"Contactez-nous pour plus d’informations."
},
ar:{
greet:"السلام عليكم",
title:"بسم الله الرحمن الرحيم",
intro1:"نرحب بجميع طالبي الهداية.",
intro2:"نقدم إرشادات قرآنية وحياتية.",
services:[
"الرزق",
"الزواج",
"النجاح",
"الاستخارة",
"المشاكل",
"الإيمان",
"الطلاب",
"السلام"
],
closing:"نسعى لنشر النور والسلام.",
contact:"للتواصل معنا مباشرة."
}
};

function setLang(lang){

document.getElementById("greet").innerText=texts[lang].greet;
document.getElementById("title").innerText=texts[lang].title;
document.getElementById("intro1").innerText=texts[lang].intro1;
document.getElementById("intro2").innerText=texts[lang].intro2;
document.getElementById("closing").innerText=texts[lang].closing;
document.getElementById("contact").innerText=texts[lang].contact;

/* SERVICES */
let list="";
texts[lang].services.forEach(s=>{
list+=`<li>${s}</li>`;
});
document.getElementById("services").innerHTML=list;
}

/* BACKGROUND ROTATION */
const bg=[
"https://images.unsplash.com/photo-1519817650390-64a93db51149",
"https://images.unsplash.com/photo-1529655683826-aba9b3e77383",
"https://images.unsplash.com/photo-1506744038136-46273834b3fb"
];

let i=0;
setInterval(()=>{
document.body.style.backgroundImage=`url('${bg[i]}')`;
i=(i+1)%bg.length;
},5000);

/* POPUP EVERY 7 SEC */
setInterval(()=>{
let p=document.getElementById("popup");
p.style.display="flex";
setTimeout(()=>p.style.display="none",5000);
},7000);

document.body.style.backgroundImage=`url('${bg[0]}')`;

</script>

</body>
</html>
