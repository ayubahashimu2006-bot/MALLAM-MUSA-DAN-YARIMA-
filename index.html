<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mallam Musa Dan Yarima</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.9));
color:#fff;
transition:1s;
}

/* HERO */
.hero{text-align:center;padding:80px 20px 40px;}
.hero h1{font-size:42px;}
.hero p{opacity:0.85;}

/* CONTAINER */
.container{max-width:1100px;margin:auto;padding:20px;}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:20px;border-radius:16px;margin:15px 0;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
transition:0.3s;
}
.card:hover{transform:translateY(-6px);}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery a{position:relative;overflow:hidden;border-radius:12px;}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
transition:0.5s;
}

.gallery a::after{
content:"Chat on WhatsApp";
position:absolute;bottom:0;left:0;right:0;
background:#22c55e;
text-align:center;padding:10px;
opacity:0;transition:0.3s;
}

.gallery a:hover img{
transform:scale(1.1);
filter:brightness(0.6);
}
.gallery a:hover::after{opacity:1;}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
}
.float a{
background:#22c55e;
padding:14px;
border-radius:50px;
color:#fff;
text-decoration:none;
}

/* POPUP */
.popup{
position:fixed;
bottom:90px;
right:20px;
background:#111;
padding:15px;
border-radius:10px;
display:none;
}

/* FOOTER */
footer{text-align:center;padding:20px;opacity:0.7;}
</style></head><body><div class="hero">
<h1>Mallam Musa Dan Yarima</h1>
<p>Spiritual Guidance • Prayer Support • Life Counseling</p>
</div><div class="container"><div class="card">
<h2>About</h2>
<p>Trusted spiritual guidance and support.</p>
</div><div class="card">

</a><a href="https://wa.me/2349125087454?text=Hello%20I%20saw%20your%20work">
<img src="img2.jpg">
</a><a href="https://wa.me/2349125087454?text=Hello%20I%20saw%20your%20work">
<img src="img3.jpg">
</a></div>
</div></div><div class="float">
<a href="https://wa.me/2349125087454">💬 Chat</a>
</div><div class="popup" id="popup">
👉 <a href="https://wa.me/2349125087454">Chat on WhatsApp</a>
</div><footer>© 2026 Mallam Musa Dan Yarima</footer><script>
setTimeout(()=>{
document.getElementById("popup").style.display="block";
